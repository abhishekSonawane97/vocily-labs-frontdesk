<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocily Labs — Case Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Mukta:wght@500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#0F4C5C; --teal-deep:#0B3A47; --ink:#10202A; --coral:#FF7B54;
    --amber:#FFB627; --paper:#F7F5F0; --line:#E3DDD2; --muted:#5C6B70; --stage:#cfd4d6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0; height:100%; background:var(--stage);
    font-family:'Inter','Mukta',system-ui,Arial,sans-serif; color:var(--ink); overflow:hidden;}

  /* ---------- top bar ---------- */
  .bar{height:66px; display:flex; align-items:center; gap:18px; padding:0 20px;
    background:linear-gradient(135deg,var(--teal),var(--teal-deep)); color:#EAF3F4;
    box-shadow:0 4px 18px rgba(0,0,0,.22); position:relative; z-index:5;}
  .brand{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px; letter-spacing:.02em; white-space:nowrap;}
  .brand .dot{color:var(--coral);}
  .brand small{display:block; font-family:'Inter',sans-serif; font-weight:400; font-size:10px; letter-spacing:.12em; color:#9FC2C6; text-transform:uppercase;}

  .tabs{display:flex; gap:6px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16);
    padding:5px; border-radius:999px; margin:0 auto;}
  .tab{font:inherit; font-weight:600; font-size:14px; color:#CDE3E6; background:transparent; border:0;
    padding:8px 18px; border-radius:999px; cursor:pointer; transition:all .15s; font-family:'Mukta','Inter',sans-serif;}
  .tab:hover{color:#fff;}
  .tab.on{background:#fff; color:var(--teal-deep); box-shadow:0 2px 8px rgba(0,0,0,.18);}

  .actions{display:flex; align-items:center; gap:10px; white-space:nowrap;}
  .btn{font:inherit; font-weight:600; font-size:14px; border-radius:9px; padding:10px 16px; cursor:pointer;
    text-decoration:none; display:inline-flex; align-items:center; gap:7px; border:1px solid transparent; transition:all .15s;}
  .btn.dl{background:var(--coral); color:#fff; box-shadow:0 4px 12px rgba(255,123,84,.4);}
  .btn.dl:hover{filter:brightness(1.06);}
  .btn.ghost{background:transparent; color:#DCEAEC; border-color:rgba(255,255,255,.28);}
  .btn.ghost:hover{background:rgba(255,255,255,.12); color:#fff;}

  /* ---------- preview stage ---------- */
  .stage{position:absolute; top:66px; left:0; right:0; bottom:0; overflow:auto; background:var(--stage);
    -webkit-overflow-scrolling:touch;}
  .wrap{margin:0 auto;}
  iframe.frame{border:0; display:block; transform-origin:top left; background:var(--stage);}
  /* fallback (cross-origin / file://): plain full-size iframe */
  .stage.plain iframe.frame{width:100%!important; height:100%!important; transform:none!important;}
  .stage.plain .wrap{width:100%!important; height:100%!important;}

  .hint{position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:6;
    background:rgba(16,32,42,.9); color:#DCEAEC; font-size:12px; padding:7px 14px; border-radius:999px;
    box-shadow:0 4px 14px rgba(0,0,0,.25); opacity:0; transition:opacity .4s; pointer-events:none;}
  .hint.show{opacity:1;}

  @media (max-width:820px){
    .bar{height:auto; flex-wrap:wrap; gap:10px; padding:10px 14px;}
    .tabs{order:3; width:100%; margin:0; justify-content:center;}
    .stage{top:128px;}
  }
</style>
</head>
<body>

<div class="bar">
  <div class="brand">VOCILY<span class="dot">.</span> LABS<small>WhatsApp Front Desk · Case Study</small></div>
  <div class="tabs" id="tabs">
    <button class="tab" data-lang="en">English</button>
    <button class="tab" data-lang="hi">हिंदी</button>
    <button class="tab" data-lang="mr">मराठी</button>
  </div>
  <div class="actions">
    <a class="btn dl" id="dl" href="#" download>⤓ Download PDF</a>
    <button class="btn ghost" id="print" title="Print the shown language">🖨 Print</button>
    <a class="btn ghost" id="open" href="#" target="_blank" rel="noopener" title="Open full deck in a new tab">Open ↗</a>
  </div>
</div>

<div class="stage" id="stage">
  <div class="wrap" id="wrap"><iframe class="frame" id="frame" title="Case study preview"></iframe></div>
</div>

<div class="hint" id="hint"></div>

<script>
  var DECKS = {
    en: { file:'deck-en.html', pdf:'Vocily-Labs-Case-Study.pdf',         label:'English' },
    hi: { file:'deck-hi.html', pdf:'Vocily-Labs-Case-Study-Hindi.pdf',   label:'हिंदी'  },
    mr: { file:'deck-mr.html', pdf:'Vocily-Labs-Case-Study-Marathi.pdf', label:'मराठी'  }
  };
  var BASE_W = 1180;                  // px sandbox width for the A4-landscape deck (297mm ≈ 1123px)
  var frame = document.getElementById('frame');
  var stage = document.getElementById('stage');
  var wrap  = document.getElementById('wrap');
  var dl    = document.getElementById('dl');
  var open  = document.getElementById('open');
  var hint  = document.getElementById('hint');
  var cur   = 'en';

  function flash(msg){ hint.textContent = msg; hint.classList.add('show'); clearTimeout(flash._t); flash._t = setTimeout(function(){ hint.classList.remove('show'); }, 2600); }

  function detect(){
    var h = (location.hash || '').replace('#','').toLowerCase();
    if (DECKS[h]) return h;
    try { var s = localStorage.getItem('vocily-lang'); if (DECKS[s]) return s; } catch(e){}
    var n = (navigator.language || 'en').slice(0,2).toLowerCase();
    if (DECKS[n]) return n;
    return 'en';
  }

  // fit the (same-origin) deck to the stage width; clean up the deck's own print bar
  function fit(){
    try{
      var doc = frame.contentDocument;
      if (!doc) throw new Error('no doc');
      var pb = doc.querySelector('.printbar'); if (pb) pb.style.display = 'none';
      doc.body.style.paddingTop = '0';
      var h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
      var avail = stage.clientWidth - 24;
      var s = Math.min(1, avail / BASE_W);
      stage.classList.remove('plain');
      frame.style.width  = BASE_W + 'px';
      frame.style.height = h + 'px';
      frame.style.transform = 'scale(' + s + ')';
      wrap.style.width  = (BASE_W * s) + 'px';
      wrap.style.height = (h * s) + 'px';
    } catch(e){
      // cross-origin (e.g. opened from disk without a server) → plain full-size iframe
      stage.classList.add('plain');
    }
  }

  function select(lang, fromHash){
    if (!DECKS[lang]) lang = 'en';
    cur = lang;
    try { localStorage.setItem('vocily-lang', lang); } catch(e){}
    if (!fromHash) { try { history.replaceState(null, '', '#' + lang); } catch(e){ location.hash = lang; } }

    var t = document.querySelectorAll('.tab');
    for (var i=0;i<t.length;i++){ t[i].classList.toggle('on', t[i].getAttribute('data-lang') === lang); }

    dl.href = DECKS[lang].pdf;
    dl.setAttribute('download', '');
    open.href = DECKS[lang].file;
    document.title = 'Vocily Labs — Case Study (' + DECKS[lang].label + ')';

    frame.onload = fit;
    frame.src = DECKS[lang].file;
  }

  // wiring
  document.getElementById('tabs').addEventListener('click', function(e){
    var b = e.target.closest('.tab'); if (b) select(b.getAttribute('data-lang'));
  });
  document.getElementById('print').addEventListener('click', function(){
    try { frame.contentWindow.focus(); frame.contentWindow.print(); }
    catch(e){ window.open(DECKS[cur].file, '_blank'); flash('Opened the deck in a new tab — press Ctrl/Cmd+P to print.'); }
  });
  dl.addEventListener('click', function(){ flash('Downloading the ' + DECKS[cur].label + ' PDF…'); });
  window.addEventListener('resize', function(){ if (!stage.classList.contains('plain')) fit(); });
  window.addEventListener('hashchange', function(){
    var h = (location.hash||'').replace('#','').toLowerCase();
    if (DECKS[h] && h !== cur) select(h, true);
  });

  select(detect(), true);
</script>
</body>
</html>
